<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oliwia Super Agent — Voice Call</title>
  <style>
    :root{
      --bg:#f6f7f8; --card:#fff; --border:#e6e8eb; --text:#111827;
      --muted:#6b7280; --primary:#111827; --danger:#dc2626;
    }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    .wrap{ max-width:520px; margin:0 auto; padding:24px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,.04); }
    .title{ font-size:18px; font-weight:700; margin:0 0 6px; }
    .sub{ margin:0 0 18px; color:var(--muted); }
    .timer{ font-size:44px; font-weight:800; letter-spacing:1px; margin:14px 0 6px; }
    .status{ color:#2b2f36; margin:0 0 10px; }
    .microw{ display:flex; align-items:center; gap:10px; margin:0 0 16px; color:var(--muted); font-size:12px; }
    .dot{ width:10px; height:10px; border-radius:999px; background:#cbd5e1; box-shadow:0 0 0 0 rgba(17,24,39,.25); }
    .dot.listening{ background:#22c55e; animation:pulse 1.2s infinite; }
    .dot.thinking{ background:#f59e0b; animation:pulse 1.2s infinite; }
    .dot.speaking{ background:#3b82f6; animation:pulse 1.2s infinite; }
    @keyframes pulse{
      0%{ box-shadow:0 0 0 0 rgba(17,24,39,.18); }
      70%{ box-shadow:0 0 0 10px rgba(17,24,39,0); }
      100%{ box-shadow:0 0 0 0 rgba(17,24,39,0); }
    }
    .row{ display:flex; gap:10px; }
    button{ flex:1; padding:12px 14px; border-radius:12px; border:1px solid #d7dbe0; background:#fff; font-weight:700; cursor:pointer; }
    button.primary{ background:var(--primary); color:#fff; border-color:var(--primary); }
    button.danger{ background:var(--danger); color:#fff; border-color:var(--danger); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .hint{ margin-top:12px; font-size:12px; color:var(--muted); line-height:1.35; }
    .small{ font-size:12px; color:var(--muted); margin-top:8px; white-space:pre-wrap; }

    /* Hide the default webchat UI */
    #bp-webchat, .bpw-widget-btn, .bpw-widget-container, .bpw-layout, .bpw-chat-container { display:none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="title">Oliwia Super Agent</p>
      <p class="sub">Voice consultation (web)</p>

      <div class="timer" id="timer">00:00</div>
      <p class="status" id="status">Ready.</p>

      <div class="microw">
        <div class="dot" id="dot"></div>
        <div id="miclabel">Idle</div>
      </div>

      <div class="row">
        <button class="primary" id="startBtn">Start Call</button>
        <button class="danger" id="hangBtn" disabled>Hang Up</button>
      </div>

      <div class="hint">
        Chrome/Edge recommended. This runs Botpress Webchat hidden in the background and makes it feel like a phone call.
      </div>

      <div class="small" id="debug"></div>
    </div>
  </div>

<script>
/** =======================
 *  CONFIG
 *  ======================= */
const CONFIG_URL = "https://files.bpcontent.cloud/2026/02/27/04/20260227040015-FOQXNUVC.json";
const INJECT_URL = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";

const BOT_INIT_TIMEOUT_MS = 20000;
const BOT_REPLY_TIMEOUT_MS = 30000;
const MAX_BOT_SPOKEN_CHARS = 700;

/** =======================
 *  UI helpers
 *  ======================= */
const timerEl  = document.getElementById("timer");
const statusEl = document.getElementById("status");
const debugEl  = document.getElementById("debug");
const startBtn = document.getElementById("startBtn");
const hangBtn  = document.getElementById("hangBtn");
const dotEl    = document.getElementById("dot");
const micLabel = document.getElementById("miclabel");

function setDebug(t){ debugEl.textContent = t || ""; }
function log(...args){
  console.log("[VOICE]", ...args);
  const msg = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
  setDebug(msg);
}
function fmtTime(ms){
  const s = Math.floor(ms/1000), m = Math.floor(s/60), r = s%60;
  return String(m).padStart(2,"0") + ":" + String(r).padStart(2,"0");
}
function setState(state, statusText){
  dotEl.className = "dot" + (state ? " " + state : "");
  micLabel.textContent = state ? state.toUpperCase() : "IDLE";
  statusEl.textContent = statusText || (state ? state[0].toUpperCase() + state.slice(1) + "…" : "Ready.");
}

/** =======================
 *  Timer
 *  ======================= */
let callOn=false, timerInt=null, startedAt=null;
function startTimer(){
  startedAt = Date.now();
  timerEl.textContent = "00:00";
  timerInt = setInterval(()=> timerEl.textContent = fmtTime(Date.now()-startedAt), 250);
}
function stopTimer(){ clearInterval(timerInt); timerInt=null; }

/** =======================
 *  Browser TTS
 *  ======================= */
const synth = window.speechSynthesis;

function pickVoice(){
  const voices = synth?.getVoices?.() || [];
  return voices.find(v => /Google|Samantha|Daniel|Karen|Moira/i.test(v.name)) || voices[0] || null;
}
function normalizeForSpeech(t){
  if (!t) return t;
  // Helps English voices pronounce Oliwia correctly
  return t.replace(/\bOliwia\b/g, "Olivia").replace(/\s+/g, " ").trim();
}
function speak(text){
  return new Promise(resolve=>{
    if(!synth) return resolve();
    synth.cancel();
    const u = new SpeechSynthesisUtterance(normalizeForSpeech(text));
    const v = pickVoice(); if(v) u.voice = v;
    u.rate = 0.98; u.pitch = 1.0;
    u.onend = resolve; u.onerror = resolve;
    synth.speak(u);
  });
}

/** =======================
 *  Browser STT
 *  ======================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const canSTT = !!SpeechRecognition;
let rec = null;

/** =======================
 *  Botpress bootstrap (NEW API)
 *  - init: window.botpress.init({ configUrl })
 *  - events: window.botpress.on('webchat:initialized' / 'webchat:ready' / 'message')
 *  - send: window.botpress.sendMessage(text)
 * ======================= */
let bpReady = false;
let unsubscribeMsg = null;

async function loadScript(src){
  return new Promise((resolve, reject)=>{
    const s = document.createElement("script");
    s.src = src;
    s.async = true;
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("Failed to load script: " + src));
    document.head.appendChild(s);
  });
}

async function probeConfigUrl(){
  const res = await fetch(CONFIG_URL, { method:"GET", cache:"no-store" });
  if(!res.ok) throw new Error(`configUrl fetch failed (${res.status})`);
  const txt = await res.text();
  if(!txt.trim()) throw new Error("configUrl returned empty body");
  return true;
}

function waitForEventOnce(eventName, timeoutMs){
  return new Promise((resolve, reject)=>{
    let done = false;
    const t = setTimeout(()=>{
      if(done) return;
      done = true;
      reject(new Error(`Timed out waiting for ${eventName}`));
    }, timeoutMs);

    const off = window.botpress.on(eventName, (payload)=>{
      if(done) return;
      done = true;
      clearTimeout(t);
      try { off?.(); } catch {}
      resolve(payload);
    });
  });
}

async function initBotpress(){
  setState("thinking", "Checking config…");
  await probeConfigUrl();
  log("configUrl OK");

  setState("thinking", "Loading Botpress…");
  await loadScript(INJECT_URL);
  log("inject.js loaded");

  if(!window.botpress || typeof window.botpress.init !== "function"){
    throw new Error("window.botpress.init not found (script blocked or API changed)");
  }

  // Initialize webchat
  window.botpress.init({ configUrl: CONFIG_URL });

  // Wait until initialized
  await waitForEventOnce("webchat:initialized", BOT_INIT_TIMEOUT_MS);
  log("webchat:initialized");

  // Open webchat once so it becomes ready to receive messages (we hide UI via CSS)
  try { window.botpress.open(); } catch {}

  // Wait until ready
  await waitForEventOnce("webchat:ready", BOT_INIT_TIMEOUT_MS);
  log("webchat:ready");

  bpReady = true;
  return true;
}

/** =======================
 *  Bot reply handling
 * ======================= */
let waitingForBot = false;
let awaitingReplyResolver = null;
let awaitingReplyTimer = null;

function waitForBotReply(){
  return new Promise((resolve)=>{
    awaitingReplyResolver = resolve;
    clearTimeout(awaitingReplyTimer);
    awaitingReplyTimer = setTimeout(()=>{
      awaitingReplyResolver = null;
      resolve(null);
    }, BOT_REPLY_TIMEOUT_MS);
  });
}
function resolveBotReply(text){
  if(!awaitingReplyResolver) return;
  clearTimeout(awaitingReplyTimer);
  const r = awaitingReplyResolver;
  awaitingReplyResolver = null;
  r(text);
}

function attachMessageListener(){
  try { unsubscribeMsg?.(); } catch {}
  unsubscribeMsg = window.botpress.on("message", (message) => {
    if(!callOn) return;

    // Message object includes direction + payload; outgoing = bot → user
    const direction = message?.direction;
    const text = message?.payload?.text;

    if(direction === "outgoing" && typeof text === "string" && text.trim()){
      if(waitingForBot){
        resolveBotReply(text.trim());
      }
    }
  });
}

/** =======================
 *  Voice loop
 * ======================= */
async function listenOnce(){
  if(!canSTT){
    setState("", "Voice input not supported. Use Chrome/Edge.");
    return;
  }

  try { synth?.cancel?.(); } catch {}

  rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  setState("listening", "Listening…");

  rec.onresult = async (e)=>{
    const userText = (e.results?.[0]?.[0]?.transcript || "").trim();
    if(!userText){
      if(callOn) setTimeout(listenOnce, 200);
      return;
    }

    try{
      setState("thinking", "Thinking…");
      log("you →", userText);

      waitingForBot = true;

      // Send message (NEW API)
      await window.botpress.sendMessage(userText);

      const botText = await waitForBotReply();
      waitingForBot = false;

      if(!callOn) return;

      if(!botText){
        setState("", "No response. Try again.");
        await speak("Sorry, I didn’t get a response. Please try again.");
        return listenOnce();
      }

      const spoken = botText.replace(/\s+/g, " ").trim().slice(0, MAX_BOT_SPOKEN_CHARS);
      log("bot →", spoken);

      setState("speaking", "Speaking…");
      await speak(spoken);

      if(callOn) return listenOnce();
    } catch(err){
      console.error(err);
      waitingForBot = false;
      setState("", "Connection issue.");
      setDebug(String(err?.message || err));
      await speak("Sorry, there was a connection issue.");
      if(callOn) return listenOnce();
    }
  };

  rec.onerror = ()=>{
    setState("", "Didn’t catch that. Try again.");
    if(callOn) setTimeout(listenOnce, 400);
  };

  rec.onend = ()=>{
    if(callOn && !waitingForBot) setTimeout(listenOnce, 250);
  };

  rec.start();
}

/** =======================
 *  Call controls
 * ======================= */
async function startCall(){
  callOn = true;
  startBtn.disabled = true;
  hangBtn.disabled = false;
  setDebug("");
  startTimer();

  setState("thinking","Loading agent…");

  if(!bpReady){
    try{
      await initBotpress();
      attachMessageListener();
    } catch(e){
      hangUp();
      setState("", "Agent failed to load.");
      setDebug(String(e?.message || e));
      return;
    }
  }

  setState("speaking", "Connected.");
  await speak("Hi, you're connected. What can I help you with today?");
  await listenOnce();
}

function hangUp(){
  callOn = false;
  startBtn.disabled = false;
  hangBtn.disabled = true;

  setState("", "Call ended.");
  stopTimer();

  try { synth?.cancel?.(); } catch {}
  try { rec?.stop?.(); } catch {}
  rec = null;

  waitingForBot = false;
  awaitingReplyResolver = null;
  clearTimeout(awaitingReplyTimer);
  awaitingReplyTimer = null;
}

startBtn.onclick = ()=> startCall().catch(err=>{
  console.error(err);
  hangUp();
  setState("", "Could not start.");
  setDebug(String(err?.message || err));
});
hangBtn.onclick = hangUp;

if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = ()=> pickVoice();
</script>
</body>
</html>
