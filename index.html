<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Oliwia Super Agent — Voice Call</title>
  <style>
    :root{
      --bg:#f6f7f8; --card:#fff; --border:#e6e8eb; --text:#111827;
      --muted:#6b7280; --primary:#111827; --danger:#dc2626;
    }
    body{ margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); }
    .wrap{ max-width:520px; margin:0 auto; padding:24px; }
    .card{ background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px; box-shadow:0 6px 18px rgba(0,0,0,.04); }
    .title{ font-size:18px; font-weight:700; margin:0 0 6px; }
    .sub{ margin:0 0 18px; color:var(--muted); }
    .timer{ font-size:44px; font-weight:800; letter-spacing:1px; margin:14px 0 6px; }
    .status{ color:#2b2f36; margin:0 0 10px; }
    .microw{ display:flex; align-items:center; gap:10px; margin:0 0 16px; color:var(--muted); font-size:12px; }
    .dot{
      width:10px; height:10px; border-radius:999px; background:#cbd5e1;
      box-shadow:0 0 0 0 rgba(17,24,39,.25);
    }
    .dot.listening{ background:#22c55e; animation:pulse 1.2s infinite; }
    .dot.thinking{ background:#f59e0b; animation:pulse 1.2s infinite; }
    .dot.speaking{ background:#3b82f6; animation:pulse 1.2s infinite; }
    @keyframes pulse{
      0%{ box-shadow:0 0 0 0 rgba(17,24,39,.18); }
      70%{ box-shadow:0 0 0 10px rgba(17,24,39,0); }
      100%{ box-shadow:0 0 0 0 rgba(17,24,39,0); }
    }
    .row{ display:flex; gap:10px; }
    button{ flex:1; padding:12px 14px; border-radius:12px; border:1px solid #d7dbe0; background:#fff; font-weight:700; cursor:pointer; }
    button.primary{ background:var(--primary); color:#fff; border-color:var(--primary); }
    button.danger{ background:var(--danger); color:#fff; border-color:var(--danger); }
    button:disabled{ opacity:.55; cursor:not-allowed; }
    .hint{ margin-top:12px; font-size:12px; color:var(--muted); line-height:1.35; }
    .small{ font-size:12px; color:var(--muted); margin-top:8px; white-space:pre-wrap; }

    /* Hide any Botpress webchat UI entirely */
    #bp-webchat, .bpw-widget-btn, .bpw-widget-container, .bpw-layout, .bpw-chat-container { display:none !important; }
  </style>

  <!-- Botpress Webchat runtime -->
  <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <p class="title">Oliwia Super Agent</p>
      <p class="sub">Voice consultation (web)</p>

      <div class="timer" id="timer">00:00</div>
      <p class="status" id="status">Ready.</p>

      <div class="microw">
        <div class="dot" id="dot"></div>
        <div id="miclabel">Idle</div>
      </div>

      <div class="row">
        <button class="primary" id="startBtn">Start Call</button>
        <button class="danger" id="hangBtn" disabled>Hang Up</button>
      </div>

      <div class="hint">
        Best in Chrome/Edge. Mic requires HTTPS (GitHub Pages is HTTPS). This uses Botpress Webchat hidden in the background
        and speaks responses aloud. If replies feel slow, that’s model latency—this UI shows “Thinking…” while waiting.
      </div>

      <div class="small" id="debug"></div>
    </div>
  </div>

<script>
/** =======================
 *  CONFIG
 *  ======================= */
const CONFIG_URL = "https://files.bpcontent.cloud/2026/02/27/04/20260227040015-FOQXNUVC.json";

// “Feels faster” defaults
const MAX_BOT_SPOKEN_CHARS = 700;        // keep replies short in speech
const BOT_REPLY_TIMEOUT_MS = 30000;      // how long to wait for a reply before prompting retry

/** =======================
 *  UI helpers
 *  ======================= */
const timerEl  = document.getElementById("timer");
const statusEl = document.getElementById("status");
const debugEl  = document.getElementById("debug");
const startBtn = document.getElementById("startBtn");
const hangBtn  = document.getElementById("hangBtn");
const dotEl    = document.getElementById("dot");
const micLabel = document.getElementById("miclabel");

function setDebug(t){ debugEl.textContent = t || ""; }
function log(...args){
  try { console.log("[VOICE]", ...args); } catch {}
  const msg = args.map(a => typeof a === "string" ? a : JSON.stringify(a)).join(" ");
  setDebug(msg);
}
function fmtTime(ms){
  const s = Math.floor(ms/1000), m = Math.floor(s/60), r = s%60;
  return String(m).padStart(2,"0") + ":" + String(r).padStart(2,"0");
}
function setState(state, statusText){
  dotEl.className = "dot" + (state ? " " + state : "");
  micLabel.textContent = state ? state.toUpperCase() : "IDLE";
  statusEl.textContent = statusText || (state ? state[0].toUpperCase() + state.slice(1) + "…" : "Ready.");
}

/** =======================
 *  Call timer
 *  ======================= */
let callOn = false;
let timerInt = null;
let startedAt = null;
function startTimer(){
  startedAt = Date.now();
  timerEl.textContent = "00:00";
  timerInt = setInterval(() => timerEl.textContent = fmtTime(Date.now() - startedAt), 250);
}
function stopTimer(){ clearInterval(timerInt); timerInt = null; }

/** =======================
 *  Browser TTS (free)
 *  ======================= */
const synth = window.speechSynthesis;

function pickVoice(){
  const voices = synth?.getVoices?.() || [];
  // Prefer high-quality common voices if available
  return voices.find(v => /Google|Samantha|Daniel|Karen|Moira/i.test(v.name)) || voices[0] || null;
}

// Improves pronunciation for your use-case
function normalizeForSpeech(t){
  if (!t) return t;
  // Oliwia pronunciation hint: “oh-LIV-ee-ah” or “Olivia” equivalent
  // (We can’t force exact phonemes reliably across all voices, but this helps.)
  return t
    .replace(/\bOliwia\b/g, "Olivia") // makes most English voices say it right
    .replace(/\s+/g, " ")
    .trim();
}

async function speak(text){
  return new Promise(resolve => {
    if (!synth) return resolve();
    synth.cancel();
    const u = new SpeechSynthesisUtterance(normalizeForSpeech(text));
    const v = pickVoice();
    if (v) u.voice = v;
    u.rate = 0.98;
    u.pitch = 1.0;
    u.onend = resolve;
    u.onerror = resolve;
    synth.speak(u);
  });
}

/** =======================
 *  Browser STT (free)
 *  ======================= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const canSTT = !!SpeechRecognition;
let rec = null;

/** =======================
 *  Botpress hidden runtime
 *  ======================= */
let bpReady = false;
let waitingForBot = false;
let lastUserUtteranceAt = 0;

// We’ll treat any bot message event we can detect as “reply”
let awaitingReplyResolver = null;
let awaitingReplyTimer = null;

function waitForBotReply(){
  return new Promise((resolve) => {
    awaitingReplyResolver = resolve;
    clearTimeout(awaitingReplyTimer);
    awaitingReplyTimer = setTimeout(() => {
      awaitingReplyResolver = null;
      resolve(null);
    }, BOT_REPLY_TIMEOUT_MS);
  });
}

function resolveBotReply(text){
  if (!awaitingReplyResolver) return;
  clearTimeout(awaitingReplyTimer);
  const r = awaitingReplyResolver;
  awaitingReplyResolver = null;
  r(text);
}

/**
 * Botpress Webchat posts messages to window. The exact shape varies.
 * We aggressively extract any plausible bot text payload.
 */
function extractBotTextFromPostMessage(evtData){
  if (!evtData || typeof evtData !== "object") return null;

  // Common candidates across versions:
  const candidates = [
    evtData?.payload?.text,
    evtData?.payload?.message?.text,
    evtData?.data?.message?.payload?.text,
    evtData?.message?.payload?.text,
    evtData?.data?.payload?.text
  ];

  const text = candidates.find(x => typeof x === "string" && x.trim());
  return text ? text.trim() : null;
}

/**
 * Heuristic to decide “is this likely a bot message?”
 * (Since we hide UI, we only need a reliable-ish signal.)
 */
function isLikelyBotMessage(evtData){
  const s = JSON.stringify(evtData);
  // Try common markers. If your bot also sends these for user, we still gate on timing.
  if (/outgoing/i.test(s)) return true;
  if (/(bot|assistant)/i.test(s)) return true;
  if (/message/i.test(s) && /payload/i.test(s)) return true;
  return false;
}

function initHiddenBotpress(){
  if (!window.botpressWebChat) return false;

  window.botpressWebChat.init({ configUrl: CONFIG_URL });

  // Ensure widget stays hidden if it tries to show
  try { window.botpressWebChat.sendEvent({ type: "hide" }); } catch {}

  // Listen for webchat events via postMessage
  window.addEventListener("message", async (event) => {
    if (!callOn) return;

    const text = extractBotTextFromPostMessage(event.data);
    if (!text) return;

    // Gate to avoid accidentally reading back our own user utterance echoes:
    // Only accept as bot reply if:
    // - we are currently waiting for a bot reply, AND
    // - the message happens after the last user utterance timestamp, AND
    // - it looks bot-ish enough
    if (!waitingForBot) return;
    const now = Date.now();
    if (now - lastUserUtteranceAt < 150) return; // too fast; likely echo/noise

    // If it’s not bot-ish, still allow it after a bit (some versions don’t tag well)
    const botish = isLikelyBotMessage(event.data);
    if (!botish && (now - lastUserUtteranceAt) < 600) return;

    resolveBotReply(text);
  });

  bpReady = true;
  log("Botpress hidden runtime ready");
  return true;
}

// Wait for inject.js to be ready
(function waitBP(){
  if (initHiddenBotpress()) return;
  setTimeout(waitBP, 200);
})();

/** =======================
 *  Voice loop
 *  ======================= */
async function listenOnce(){
  if (!canSTT){
    setState("", "Voice input not supported. Use Chrome/Edge.");
    return;
  }

  // Barge-in: if user starts speaking, stop TTS
  try { synth?.cancel?.(); } catch {}

  rec = new SpeechRecognition();
  rec.lang = "en-US";
  rec.interimResults = false;
  rec.maxAlternatives = 1;

  setState("listening", "Listening…");

  rec.onresult = async (e) => {
    const userText = (e.results?.[0]?.[0]?.transcript || "").trim();
    if (!userText) {
      if (callOn) setTimeout(listenOnce, 250);
      return;
    }

    try {
      setState("thinking", "Thinking…");
      log("you →", userText);

      lastUserUtteranceAt = Date.now();
      waitingForBot = true;

      // Send text to bot
      window.botpressWebChat.sendPayload({ type: "text", text: userText });

      // Wait for bot reply
      const botText = await waitForBotReply();
      waitingForBot = false;

      if (!callOn) return;

      if (!botText) {
        setState("", "No response. Try again.");
        await speak("Sorry, I didn’t get a response. Please try again.");
        return listenOnce();
      }

      const spoken = botText.replace(/\s+/g, " ").trim().slice(0, MAX_BOT_SPOKEN_CHARS);
      log("bot →", spoken);

      setState("speaking", "Speaking…");
      await speak(spoken);

      // Back to listening
      if (callOn) return listenOnce();
    } catch (err) {
      console.error(err);
      waitingForBot = false;
      setState("", "Connection issue.");
      setDebug(String(err?.message || err));
      await speak("Sorry, there was a connection issue.");
      if (callOn) return listenOnce();
    }
  };

  rec.onerror = () => {
    setState("", "Didn’t catch that. Try again.");
    if (callOn) setTimeout(listenOnce, 400);
  };

  rec.onend = () => {
    // If it ends without result, restart if call is still on and we're not waiting on bot
    if (callOn && !waitingForBot) setTimeout(listenOnce, 250);
  };

  rec.start();
}

/** =======================
 *  Call controls
 *  ======================= */
async function startCall(){
  if (!bpReady){
    setState("thinking", "Loading agent…");
    await new Promise(r => setTimeout(r, 700));
  }

  callOn = true;
  startBtn.disabled = true;
  hangBtn.disabled = false;
  setDebug("");

  startTimer();

  setState("speaking", "Connecting…");
  await speak("Hi, you're connected. What can I help you with today?");
  await listenOnce();
}

function hangUp(){
  callOn = false;
  startBtn.disabled = false;
  hangBtn.disabled = true;

  setState("", "Call ended.");
  stopTimer();

  try { synth?.cancel?.(); } catch {}
  try { rec?.stop?.(); } catch {}

  waitingForBot = false;
  awaitingReplyResolver = null;
  clearTimeout(awaitingReplyTimer);
  awaitingReplyTimer = null;
}

startBtn.onclick = () => startCall().catch(err => {
  console.error(err);
  setState("", "Could not start.");
  setDebug(String(err?.message || err));
  hangUp();
});
hangBtn.onclick = hangUp;

if (synth && synth.onvoiceschanged !== undefined) {
  synth.onvoiceschanged = () => pickVoice();
}
</script>
</body>
</html>
